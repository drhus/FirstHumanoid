<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Coin Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .scene {
    perspective: 800px;
    width: 400px;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .coin {
    width: 340px;
    height: 340px;
    position: relative;
    transform-style: preserve-3d;
    animation: coinSpin 6s ease-in-out infinite;
  }
  .coin-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 50%;
    overflow: hidden;
  }
  .coin-face img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .coin-back {
    transform: rotateY(180deg);
  }
  /* Shine overlay */
  .coin::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.3) 0%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 100%
    );
    transform-style: preserve-3d;
    animation: coinSpin 6s ease-in-out infinite;
    pointer-events: none;
    z-index: 10;
  }
  /* Glow */
  .coin-glow {
    position: absolute;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: glowPulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 40px rgba(201,168,76,0.3), 0 0 80px rgba(201,168,76,0.1); }
    50% { box-shadow: 0 0 60px rgba(201,168,76,0.5), 0 0 120px rgba(201,168,76,0.2); }
  }
  /* Shadow on floor */
  .shadow {
    position: absolute;
    bottom: -30px;
    width: 280px;
    height: 30px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%);
    animation: shadowPulse 6s ease-in-out infinite;
  }
  @keyframes shadowPulse {
    0%, 100% { transform: scaleX(1); opacity: 0.6; }
    25%, 75% { transform: scaleX(0.5); opacity: 0.3; }
    50% { transform: scaleX(1); opacity: 0.6; }
  }

  @keyframes coinSpin {
    0%   { transform: rotateY(0deg) rotateX(5deg); }
    15%  { transform: rotateY(180deg) rotateX(5deg); }
    30%  { transform: rotateY(180deg) rotateX(5deg); }
    45%  { transform: rotateY(360deg) rotateX(5deg); }
    55%  { transform: rotateY(360deg) rotateX(15deg) rotateZ(5deg); }
    70%  { transform: rotateY(540deg) rotateX(5deg); }
    80%  { transform: rotateY(540deg) rotateX(-5deg) rotateZ(-3deg); }
    90%  { transform: rotateY(720deg) rotateX(5deg); }
    100% { transform: rotateY(720deg) rotateX(5deg); }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="coin-glow"></div>
  <div class="coin">
    <div class="coin-face">
      <img src="public/coin-obverse.png" alt="Obverse">
    </div>
    <div class="coin-face coin-back">
      <img src="public/coin-reverse.png" alt="Reverse">
    </div>
  </div>
  <div class="shadow"></div>
</div>
</body>
</html>
